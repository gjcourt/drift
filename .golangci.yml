version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/gjcourt/drift

linters:
  default: standard
  enable:
    - revive
    - misspell
    - gocritic
    - depguard

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: unused-parameter
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    depguard:
      rules:
        # domain is pure — no infrastructure, no ports, no other internal layer.
        domain-no-other-internal:
          files:
            - "**/internal/domain/**/*.go"
          deny:
            - pkg: "github.com/gjcourt/drift/internal/ports"
              desc: "domain must not import ports"
            - pkg: "github.com/gjcourt/drift/internal/app"
              desc: "domain must not import app"
            - pkg: "github.com/gjcourt/drift/internal/adapters"
              desc: "domain must not import adapters"

        # ports define abstract contracts — no implementations.
        ports-no-impl:
          files:
            - "**/internal/ports/**/*.go"
          deny:
            - pkg: "github.com/gjcourt/drift/internal/app"
              desc: "ports must not import app"
            - pkg: "github.com/gjcourt/drift/internal/adapters"
              desc: "ports must not import adapters"

        # adapters must not import the app layer or sibling adapters.
        adapters-isolation:
          files:
            - "**/internal/adapters/**/*.go"
          deny:
            - pkg: "github.com/gjcourt/drift/internal/app"
              desc: "adapters must not import the app layer"
            - pkg: "github.com/gjcourt/drift/internal/adapters/ingestion"
              desc: "adapters must not import sibling adapters"
            - pkg: "github.com/gjcourt/drift/internal/adapters/storage"
              desc: "adapters must not import sibling adapters"

        # app layer must not import concrete adapters — only ports.
        app-no-adapters:
          files:
            - "**/internal/app/**/*.go"
          deny:
            - pkg: "github.com/gjcourt/drift/internal/adapters"
              desc: "app must not import adapters; depend on outbound ports instead"

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
